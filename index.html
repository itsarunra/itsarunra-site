<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/png" href="/favicon.png">
  <title>Arun R. Arunothayan</title>

  <style>
    :root {
      --bg: #ffffff;
      --text: #111111;
      --muted: #666666;
      --border: #dddddd;
    }

    body.dark {
      --bg: #111111;
      --text: #f5f5f5;
      --muted: #aaaaaa;
      --border: #333333;
    }

    body {
      font-family: "Abadi MT Condensed Light", "Abadi MT Condensed", Georgia, serif;
      max-width: 680px;
      margin: 60px auto;
      padding: 0 20px;
      line-height: 1.7;
      background: var(--bg);
      color: var(--text);
      transition: background 0.2s ease, color 0.2s ease;
    }

    h1 {
      margin-bottom: 0.2em;
      letter-spacing: 0.2px;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    .muted {
      color: var(--muted);
    }

    .topbar {
      display: flex;
      justify-content: flex-end;
      margin-bottom: 40px;
    }

    button {
      background: none;
      border: 1px solid var(--border);
      color: var(--text);
      padding: 5px 10px;
      cursor: pointer;
      font: inherit;
      border-radius: 6px;
      font-size: 0.9em;
    }

    button:hover {
      opacity: 0.8;
    }
  </style>

  <!-- Cloudflare Web Analytics -->
  <script defer src='https://static.cloudflareinsights.com/beacon.min.js' data-cf-beacon='{"token": "e74a4517d935480f91db74b61c02c98f"}'></script>
</head>

<body>

<div class="topbar">
  <button id="theme-toggle">Dark</button>
</div>

<h1>Arun R. Arunothayan</h1>

<p class="muted">
Notes on concrete, construction, automation, and building things in the real world.
</p>

<script>
  const button = document.getElementById('theme-toggle');
  const savedTheme = localStorage.getItem('theme');

  if (savedTheme === 'dark') {
    document.body.classList.add('dark');
    button.textContent = 'Light';
  }

  button.addEventListener('click', () => {
    document.body.classList.toggle('dark');
    const isDark = document.body.classList.contains('dark');
    localStorage.setItem('theme', isDark ? 'dark' : 'light');
    button.textContent = isDark ? 'Light' : 'Dark';
  });
</script>

<h2>Posts</h2>
<p>
  <a href="/posts/the-labour-problem-behind-sustainable-concrete.html">
    The Labour Problem Behind Sustainable Concrete
  </a><br>
  <span class="muted">29 March 2026</span>
</p>

</body>
</html>
