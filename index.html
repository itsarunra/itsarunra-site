<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/png" href="/favicon.png">
  <title>Arun R. Arunothayan</title>

  <style>
    :root {
      --bg: #ffffff;
      --text: #111111;
      --muted: #666666;
      --border: #dddddd;
    }

    body.dark {
      --bg: #111111;
      --text: #f5f5f5;
      --muted: #aaaaaa;
      --border: #333333;
    }

    body {
      font-family: "Abadi MT Condensed Light", "Abadi MT Condensed", Georgia, serif;
      max-width: 760px;
      margin: 60px auto;
      padding: 0 20px;
      line-height: 1.7;
      background: var(--bg);
      color: var(--text);
      transition: background 0.2s ease, color 0.2s ease;
    }

    h1 {
      margin: 0 0 0.2em 0;
      letter-spacing: 0.2px;
      line-height: 1.2;
    }

    h2 {
      margin-top: 48px;
      margin-bottom: 16px;
      font-size: 1.2rem;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    a:hover {
      opacity: 0.8;
    }

    .muted {
      color: var(--muted);
    }

    .topbar {
      display: flex;
      justify-content: flex-end;
      margin-bottom: 40px;
    }

    button {
      background: none;
      border: 1px solid var(--border);
      color: var(--text);
      padding: 5px 10px;
      cursor: pointer;
      font: inherit;
      border-radius: 6px;
      font-size: 0.9em;
    }

    button:hover {
      opacity: 0.8;
    }

    .hero {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 40px;
      margin-bottom: 20px;
    }

    .hero-text {
      flex: 1;
      min-width: 0;
    }

    .hero-text p {
      margin: 0;
    }

    .hero-image img {
      width: 130px;
      height: 130px;
      object-fit: cover;
      border-radius: 50%;
      display: block;
    }

    .post-item {
      margin-bottom: 20px;
    }

    .post-item span {
      display: inline-block;
      margin-top: 2px;
    }

    @media (max-width: 640px) {
      body {
        margin: 40px auto;
      }

      .hero {
        flex-direction: column;
        align-items: flex-start;
        gap: 20px;
      }

      .hero-image img {
        width: 110px;
        height: 110px;
      }
    }
  </style>

  <!-- Cloudflare Web Analytics -->
  <script defer src="https://static.cloudflareinsights.com/beacon.min.js" data-cf-beacon='{"token": "e74a4517d935480f91db74b61c02c98f"}'></script>
</head>

<body>

  <div class="topbar">
    <button id="theme-toggle">Dark</button>
  </div>

  <div class="hero">
    <div class="hero-text">
      <h1>Arun R. Arunothayan</h1>
      <p class="muted">
        Engineer working in product development across low-carbon concrete technology, advanced manufacturing, and automation. Here I write of work, and of the thoughts that gather around work.
      </p>
    </div>

    <div class="hero-image">
      <img src="/profile.jpg" alt="Portrait of Arun R. Arunothayan">
    </div>
  </div>

  <h2>Posts</h2>

  <p class="post-item">
    <a href="/posts/on-ai-workflows.html">
      On AI Workflows
    </a><br>
    <span class="muted">7 April 2026</span>
  </p>
  

  <script>
    const button = document.getElementById('theme-toggle');
    const savedTheme = localStorage.getItem('theme');

    if (savedTheme === 'dark') {
      document.body.classList.add('dark');
      button.textContent = 'Light';
    }

    button.addEventListener('click', () => {
      document.body.classList.toggle('dark');
      const isDark = document.body.classList.contains('dark');
      localStorage.setItem('theme', isDark ? 'dark' : 'light');
      button.textContent = isDark ? 'Light' : 'Dark';
    });
  </script>

</body>
</html>
